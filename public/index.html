<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>QuickBite — Order Tracker</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#F3F4F6;min-height:100vh;padding:24px 16px}

.app{max-width:780px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 32px rgba(0,0,0,0.08)}

/* Top Bar */
.topbar{background:#E8470A;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-left h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:-0.3px}
.topbar-left p{color:rgba(255,255,255,0.75);font-size:12px;margin-top:2px}
.btn-new{background:rgba(255,255,255,0.15);border:1px solid rgba(255,255,255,0.3);color:#fff;padding:8px 16px;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;transition:background 0.2s}
.btn-new:hover{background:rgba(255,255,255,0.25)}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);border-bottom:1px solid #F3F4F6}
.stat{padding:14px 16px;text-align:center;border-right:1px solid #F3F4F6}
.stat:last-child{border-right:none}
.stat-val{font-size:22px;font-weight:700;color:#111827}
.stat-val.orange{color:#E8470A}
.stat-val.green{color:#059669}
.stat-label{font-size:11px;color:#9CA3AF;margin-top:2px;text-transform:uppercase;letter-spacing:0.4px}

/* Toolbar */
.toolbar{padding:12px 24px;border-bottom:1px solid #F3F4F6;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.filters{display:flex;gap:6px;flex-wrap:wrap}
.chip{font-size:12px;padding:5px 12px;border-radius:20px;border:1px solid #E5E7EB;color:#6B7280;background:#fff;cursor:pointer;transition:all 0.15s;font-weight:500}
.chip:hover{border-color:#E8470A;color:#E8470A}
.chip.active{background:#E8470A;color:#fff;border-color:#E8470A}
.search-box{display:flex;align-items:center;gap:8px;border:1px solid #E5E7EB;border-radius:8px;padding:6px 12px;flex:1;max-width:220px}
.search-box input{border:none;outline:none;font-size:13px;color:#111827;width:100%;background:transparent}
.search-box input::placeholder{color:#9CA3AF}

/* Order List */
.order-list{list-style:none}
.order-item{display:flex;align-items:center;gap:14px;padding:14px 24px;border-bottom:1px solid #F9FAFB;transition:background 0.15s;cursor:pointer}
.order-item:hover{background:#FAFAFA}
.order-item:last-child{border-bottom:none}

.food-icon{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.order-details{flex:1;min-width:0}
.order-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.order-name{font-size:13px;font-weight:600;color:#111827;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.order-id{font-size:11px;color:#9CA3AF}
.order-items{font-size:12px;color:#6B7280;margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.progress-wrap{display:flex;align-items:center;gap:8px}
.progress-bar{flex:1;height:3px;background:#F3F4F6;border-radius:2px}
.progress-fill{height:3px;border-radius:2px;background:#E8470A;transition:width 0.4s}
.progress-fill.green{background:#059669}
.progress-time{font-size:10px;color:#9CA3AF;white-space:nowrap}

.order-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.badge{font-size:11px;padding:3px 10px;border-radius:20px;font-weight:600;white-space:nowrap}
.badge.placed{background:#EFF6FF;color:#1D4ED8}
.badge.preparing{background:#FEF9C3;color:#92400E}
.badge.ready{background:#ECFDF5;color:#065F46}
.badge.delivered{background:#F0FDF4;color:#166534}
.badge.cancelled{background:#FEF2F2;color:#991B1B}
.order-amount{font-size:14px;font-weight:700;color:#111827}
.delivery-time{font-size:11px;color:#059669;font-weight:600;margin-top:2px}
.btn-next{font-size:11px;background:#E8470A;color:#fff;border:none;border-radius:6px;padding:4px 10px;cursor:pointer;transition:background 0.2s;font-weight:500}
.btn-next:hover{background:#C73D08}
.btn-next.disabled{background:#E5E7EB;color:#9CA3AF;cursor:default}

/* Empty state */
.empty{text-align:center;padding:48px 24px;color:#9CA3AF}
.empty p{font-size:14px;margin-top:8px}

/* Footer */
.app-footer{padding:12px 24px;border-top:1px solid #F3F4F6;display:flex;justify-content:space-between;align-items:center}
.app-footer span{font-size:12px;color:#9CA3AF}

/* Modal Overlay */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:100;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:440px;margin:16px}
.modal h2{font-size:16px;font-weight:700;color:#111827;margin-bottom:20px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px;text-transform:uppercase;letter-spacing:0.4px}
.form-group input,.form-group select{width:100%;border:1px solid #E5E7EB;border-radius:8px;padding:9px 12px;font-size:14px;color:#111827;outline:none;transition:border-color 0.2s}
.form-group input:focus,.form-group select:focus{border-color:#E8470A}
.modal-actions{display:flex;gap:10px;margin-top:20px}
.btn-cancel{flex:1;padding:10px;border:1px solid #E5E7EB;border-radius:8px;background:#fff;color:#374151;font-size:14px;cursor:pointer;font-weight:500}
.btn-submit{flex:2;padding:10px;border:none;border-radius:8px;background:#E8470A;color:#fff;font-size:14px;cursor:pointer;font-weight:600;transition:background 0.2s}
.btn-submit:hover{background:#C73D08}
</style>
</head>
<body>

<div class="app">

  <!-- Top Bar -->
  <div class="topbar">
    <div class="topbar-left">
      <h1>QuickBite</h1>
      <p>Live Order Tracker</p>
    </div>
    <button class="btn-new" onclick="openModal()">+ New Order</button>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat"><div class="stat-val" id="stat-total">0</div><div class="stat-label">Total Orders</div></div>
    <div class="stat"><div class="stat-val orange" id="stat-preparing">0</div><div class="stat-label">Preparing</div></div>
    <div class="stat"><div class="stat-val green" id="stat-delivered">0</div><div class="stat-label">Delivered</div></div>
    <div class="stat"><div class="stat-val" id="stat-revenue">₹0</div><div class="stat-label">Revenue</div></div>
  </div>

  <!-- Toolbar -->
  <div class="toolbar">
    <div class="filters" id="filters">
      <span class="chip active" onclick="setFilter('all', this)">All</span>
      <span class="chip" onclick="setFilter('placed', this)">Placed</span>
      <span class="chip" onclick="setFilter('preparing', this)">Preparing</span>
      <span class="chip" onclick="setFilter('ready', this)">Ready</span>
      <span class="chip" onclick="setFilter('delivered', this)">Delivered</span>
    </div>
    <div class="search-box">
      <svg width="14" height="14" fill="none" stroke="#9CA3AF" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="search" placeholder="Search customer..." oninput="renderOrders()"/>
    </div>
  </div>

  <!-- Order List -->
  <ul class="order-list" id="order-list"></ul>

  <!-- Footer -->
  <div class="app-footer">
    <span id="footer-count">0 orders</span>
    <span id="footer-time">Updated just now</span>
  </div>

</div>

<!-- New Order Modal -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Place New Order</h2>
    <div class="form-group">
      <label>Customer Name</label>
      <input type="text" id="f-name" placeholder="e.g. Rahul Sharma"/>
    </div>
    <div class="form-group">
      <label>Items Ordered</label>
      <input type="text" id="f-items" placeholder="e.g. Pizza, Coke"/>
    </div>
    <div class="form-group">
      <label>Amount (₹)</label>
      <input type="number" id="f-amount" placeholder="e.g. 480" min="0"/>
    </div>
    <div class="form-group">
      <label>Category</label>
      <select id="f-category">
        <option value="🍕">Pizza</option>
        <option value="🍔">Burger</option>
        <option value="🍜">Noodles</option>
        <option value="🍱">Thali</option>
        <option value="🥗">Salad</option>
        <option value="🍣">Sushi</option>
        <option value="🌮">Tacos</option>
        <option value="🍦">Dessert</option>
      </select>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-submit" onclick="placeOrder()">Place Order</button>
    </div>
  </div>
</div>

<script>
const STATUSES = ['placed','preparing','ready','delivered'];
const STATUS_LABELS = { placed:'Placed', preparing:'Preparing', ready:'Ready', delivered:'Delivered', cancelled:'Cancelled' };
const PROGRESS = { placed:15, preparing:55, ready:100, delivered:100, cancelled:0 };
const ICON_BG = { placed:'#EFF6FF', preparing:'#FEF9C3', ready:'#ECFDF5', delivered:'#F0FDF4', cancelled:'#FEF2F2' };
const NEXT_LABEL = { placed:'Start Prep', preparing:'Mark Ready', ready:'Mark Delivered', delivered:'', cancelled:'' };
const DELIVERY_TIME = { 
  placed: '30-35 mins', 
  preparing: '15-20 mins', 
  ready: '2-3 mins', 
  delivered: 'Delivered on time' 
};

let orders = [];
let currentFilter = 'all';
let orderCounter = 1040;

async function loadOrders() {
  const res = await fetch('/orders');
  orders = await res.json();
  renderOrders();
  updateStats();
}

async function placeOrder() {
  const name   = document.getElementById('f-name').value.trim();
  const items  = document.getElementById('f-items').value.trim();
  const amount = parseInt(document.getElementById('f-amount').value) || 0;
  const icon   = document.getElementById('f-category').value;
  if (!name || !items) return alert('Please fill customer name and items.');
  const res = await fetch('/orders', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ customerName: name, items, amount, icon })
  });
  const order = await res.json();
  orders.unshift(order);
  closeModal();
  renderOrders();
  updateStats();
}

async function advanceStatus(id) {
  const order = orders.find(o => o.id === id);
  if (!order) return;
  const idx = STATUSES.indexOf(order.status);
  if (idx === -1 || idx >= STATUSES.length - 1) return;
  const newStatus = STATUSES[idx + 1];
  const res = await fetch(`/orders/${id}`, {
    method: 'PATCH',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({ status: newStatus })
  });
  const updated = await res.json();
  orders = orders.map(o => o.id === id ? updated : o);
  renderOrders();
  updateStats();
}

function setFilter(filter, el) {
  currentFilter = filter;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderOrders();
}

function renderOrders() {
  const search = document.getElementById('search').value.toLowerCase();
  let filtered = orders.filter(o => {
    const matchFilter = currentFilter === 'all' || o.status === currentFilter;
    const matchSearch = o.customerName.toLowerCase().includes(search);
    return matchFilter && matchSearch;
  });

  const list = document.getElementById('order-list');
  document.getElementById('footer-count').textContent = `${filtered.length} order${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    list.innerHTML = `<div class="empty"><svg width="40" height="40" fill="none" stroke="#D1D5DB" stroke-width="1.5" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/></svg><p>No orders found</p></div>`;
    return;
  }

  list.innerHTML = filtered.map(o => {
    const prog = PROGRESS[o.status] || 0;
    const isGreen = o.status === 'delivered';
    const nextLbl = NEXT_LABEL[o.status];
    const canAdvance = nextLbl !== '';
    const deliveryTime = DELIVERY_TIME[o.status] || '';
    return `
    <li class="order-item">
      <div class="food-icon" style="background:${ICON_BG[o.status]}">${o.icon}</div>
      <div class="order-details">
        <div class="order-top">
          <span class="order-name">${o.customerName}</span>
          <span class="order-id">#ORD-${o.id}</span>
        </div>
        <div class="order-items">${o.items}</div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill ${isGreen?'green':''}" style="width:${prog}%"></div></div>
          <span class="progress-time">${o.createdAt}</span>
        </div>
      </div>
      <div class="order-right">
        <span class="badge ${o.status}">${STATUS_LABELS[o.status]}</span>
        <span class="order-amount">₹${o.amount}</span>
        ${deliveryTime ? `<div class="delivery-time">${deliveryTime}</div>` : ''}
        ${canAdvance ? `<button class="btn-next" onclick="advanceStatus(${o.id})">${nextLbl}</button>` : ''}
      </div>
    </li>`;
  }).join('');
}

function updateStats() {
  document.getElementById('stat-total').textContent = orders.length;
  document.getElementById('stat-preparing').textContent = orders.filter(o => o.status === 'preparing').length;
  document.getElementById('stat-delivered').textContent = orders.filter(o => o.status === 'delivered').length;
  const rev = orders.filter(o => o.status !== 'cancelled').reduce((s, o) => s + o.amount, 0);
  document.getElementById('stat-revenue').textContent = '₹' + rev.toLocaleString('en-IN');
  document.getElementById('footer-time').textContent = 'Updated just now';
}

function openModal() {
  document.getElementById('modal').classList.add('open');
  document.getElementById('f-name').value = '';
  document.getElementById('f-items').value = '';
  document.getElementById('f-amount').value = '';
}

function closeModal() {
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

loadOrders();
</script>
</body>
</html>
